repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: python
        types_or: [python, jupyter]
        additional_dependencies: [ruff]
      - id: ruff
        name: ruff (lint)
        entry: ruff check --fix
        language: python
        types_or: [python, jupyter]
        additional_dependencies: [ruff]
      - id: nbstripout
        name: nbstripout
        entry: nbstripout --keep-output
        language: python
        types: [jupyter]
        additional_dependencies: [nbstripout]